<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSU.CSE // Decrypt_Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'terminal-green': '#00FF41',
            'terminal-dim': '#003B00',
            'void-black': '#050505',
          },
          fontFamily: {
            mono: ['"Fira Code"', 'monospace'],
            sans: ['"Jost"', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #050505; color: #F0F0F0; font-family: 'Fira Code', monospace; overflow-x: hidden; }
    #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }
    body::after {
      content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
    .input-field { background: rgba(0, 59, 0, 0.1); border: 1px solid #003B00; color: #00FF41; padding: 0.8rem; width: 100%; outline: none; transition: all 0.3s; font-size: 12px; }
    .input-field:focus { border-color: #00FF41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
    .btn-submit { border: 1px solid #00FF41; color: #00FF41; padding: 1rem; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s; background: transparent; width: 100%; font-size: 12px; }
    .btn-submit:hover { background: #00FF41; color: #050505; box-shadow: 0 0 20px #00FF41; }
  </style>
</head>

<body class="flex flex-col min-h-screen">
  <canvas id="matrix-bg"></canvas>

  <!-- NAVIGATION BAR -->
  <nav class="w-full z-50 bg-void-black/80 border-b border-terminal-dim backdrop-blur-md px-8 h-16 flex items-center justify-between">
      <div class="text-terminal-green font-bold tracking-tighter">
        [TAWAF@NSU_CSE:~]$ <span class="animate-pulse">_</span>
      </div>
      <a href="index.html" class="text-[10px] text-terminal-green hover:text-white transition-colors tracking-widest uppercase font-mono">
        << RETURN_TO_ROOT
      </a>
  </nav>

  <!-- CONTACT FORM CONTAINER -->
  <div class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-lg w-full bg-void-black/90 border border-terminal-dim p-8 backdrop-blur-lg relative z-10 shadow-2xl">
      <div class="mb-8 border-b border-terminal-dim pb-4">
        <h2 class="text-terminal-green text-xl font-bold tracking-tighter mb-1">
          > ESTABLISHING_COMMS...
        </h2>
        <p class="text-[9px] text-gray-500 uppercase tracking-widest">Target: [TAWAF@NSU_CSE]</p>
      </div>

      <form action="https://formspree.io/f/your@email.com" method="POST" class="space-y-5">
        <div>
          <label class="block text-[10px] text-terminal-green mb-2 tracking-widest uppercase">ID_Name</label>
          <input type="text" name="name" required class="input-field" placeholder="Enter identifier...">
        </div>

        <div>
          <label class="block text-[10px] text-terminal-green mb-2 tracking-widest uppercase">Return_Path</label>
          <input type="email" name="_replyto" required class="input-field" placeholder="email@domain.com">
        </div>

        <div>
          <label class="block text-[10px] text-terminal-green mb-2 tracking-widest uppercase">Encrypted_Message</label>
          <textarea name="message" required rows="4" class="input-field" placeholder="Type transmission..."></textarea>
        </div>

        <button type="submit" class="btn-submit font-bold">Execute.Transmission</button>
      </form>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00FF41';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 35);
    window.addEventListener('resize', () => { 
      canvas.width = window.innerWidth; 
      canvas.height = window.innerHeight; 
    });
  </script>
</body>
</html>
